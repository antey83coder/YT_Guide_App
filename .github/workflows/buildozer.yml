name: CI
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
          pip3 install --upgrade buildozer cython
          
          # Очищення і створення структури
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Агресивне прийняття ліцензій
          # Ми створюємо папку для ліцензій і записуємо туди підтвердження для всього SDK
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f518747865188496102319207e4d82b4961a8" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # Оновлення SDK без інтерактивних запитів
          /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --sdk_root=/home/runner/.buildozer/android/platform/android-sdk --update
          
          # Запуск збірки
          buildozer -v android debug
