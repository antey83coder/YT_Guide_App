name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer cython
      
      - name: Build with Buildozer
        run: |
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          # Оновлюємо автоінструменти для libffi перед збіркою
          export LIBFFI_DIR=$(find /home/runner/work/YT_Guide_App/YT_Guide_App/.buildozer/ -name "libffi" | head -n 1)
          if [ -d "$LIBFFI_DIR" ]; then
            cd $LIBFFI_DIR && autoreconf -vfi && cd -
          fi
          # Запускаємо збірку
          yes | buildozer -v android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
